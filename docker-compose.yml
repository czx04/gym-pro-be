services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gym-pro-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      GIN_MODE: release
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-gymadmin}
      DB_PASSWORD: ${DB_PASSWORD:-secret123}
      DB_NAME: ${DB_NAME:-gym_pro_db}
      DB_SSL_MODE: disable
      DB_MAX_CONNECTIONS: 20
      DB_MAX_IDLE_CONNECTIONS: 5
      DB_MAX_LIFETIME_MINUTES: 30
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET:-local-compose-jwt-secret-change-me}
      JWT_ACCESS_TOKEN_EXPIRE: 15m
      JWT_REFRESH_TOKEN_EXPIRE: 168h
      LOG_LEVEL: info
      LOG_ENCODING: json
      LOG_OUTPUT_PATHS: stdout
      LOG_ERROR_OUTPUT_PATHS: stderr
      RATE_LIMIT_REQUESTS_PER_MINUTE: 100
      DEFAULT_PAGE_SIZE: 20
      MAX_PAGE_SIZE: 100
      EMAIL_PROVIDER: smtp
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@gympro.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Gym Pro}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_TIMEOUT_SECONDS: 10
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      GEMINI_TIMEOUT_SECONDS: 8
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gym-pro

  postgres:
    image: pgvector/pgvector:pg16
    container_name: gym-pro-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-gymadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret123}
      POSTGRES_DB: ${DB_NAME:-gym_pro_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gym-pro

  redis:
    image: redis:7-alpine
    container_name: gym-pro-redis
    restart: unless-stopped
    command: sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"; else exec redis-server --appendonly yes; fi'
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gym-pro

volumes:
  postgres_data:
  redis_data:

networks:
  gym-pro:
    driver: bridge
