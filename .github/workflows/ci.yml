name: CI/CD

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

env:
  GO_VERSION: "1.24"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: go test -v -race -coverprofile=coverage.out $(go list ./... | grep -v '/cmd/')


      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref_name == 'master'
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Copy Kubernetes manifests
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: k8s/
          target: /opt/gym-pro
          strip_components: 0

      - name: Deploy to Kubernetes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            export KUBECONFIG=$HOME/.kube/config

            if ! command -v kubectl >/dev/null 2>&1; then
              echo "ERROR: kubectl not found on VPS"
              exit 1
            fi

            kubectl get nodes

            if ! kubectl get secret gym-pro-api-secret -n gym-pro >/dev/null 2>&1; then
              echo "Create gym-pro-api-secret and ghcr-secret on VPS before deploy."
              exit 1
            fi

            if ! kubectl get secret ghcr-secret -n gym-pro >/dev/null 2>&1; then
              echo "Create gym-pro-api-secret and ghcr-secret on VPS before deploy."
              exit 1
            fi

            kubectl apply -k /opt/gym-pro/k8s

            kubectl rollout status statefulset/postgres -n gym-pro --timeout=180s
            kubectl rollout status deployment/redis -n gym-pro --timeout=180s
            kubectl rollout status deployment/gym-pro-api -n gym-pro --timeout=180s

            kubectl get pods -n gym-pro
            kubectl get svc -n gym-pro
            kubectl get ingress -n gym-pro
