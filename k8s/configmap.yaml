apiVersion: v1
kind: ConfigMap
metadata:
  name: gym-pro-api-config
  namespace: gym-pro
data:
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8080"
  GIN_MODE: "release"
  ALLOWED_ORIGINS: "https://yourdomain.com"
  DB_HOST: "postgres-svc"
  DB_PORT: "5432"
  DB_NAME: "gym_pro_db"
  DB_SSL_MODE: "disable"
  DB_MAX_CONNECTIONS: "20"
  DB_MAX_IDLE_CONNECTIONS: "5"
  DB_MAX_LIFETIME_MINUTES: "30"
  REDIS_ADDR: "redis-svc:6379"
  REDIS_DB: "0"
  JWT_ACCESS_TOKEN_EXPIRE: "15m"
  JWT_REFRESH_TOKEN_EXPIRE: "168h"
  LOG_LEVEL: "info"
  LOG_ENCODING: "json"
  LOG_OUTPUT_PATHS: "stdout"
  LOG_ERROR_OUTPUT_PATHS: "stderr"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "100"
  DEFAULT_PAGE_SIZE: "20"
  MAX_PAGE_SIZE: "100"
  EMAIL_PROVIDER: "smtp"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  EMAIL_TIMEOUT_SECONDS: "10"
  GEMINI_MODEL: "gemini-1.5-flash"
  GEMINI_TIMEOUT_SECONDS: "8"
  TZ: "Asia/Ho_Chi_Minh"
