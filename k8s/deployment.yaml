apiVersion: apps/v1
kind: Deployment
metadata:
  name: gym-pro-api
  namespace: gym-pro
  labels:
    app: gym-pro-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gym-pro-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gym-pro-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres-svc 5432; do sleep 2; done
        - name: wait-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis-svc 6379; do sleep 2; done
      containers:
        - name: api
          image: ghcr.io/czx04/gym-pro-be:master
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: gym-pro-api-config
            - secretRef:
                name: gym-pro-api-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      terminationGracePeriodSeconds: 30
